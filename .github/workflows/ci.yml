on:
  pull_request:
  push:
    branches:
      - main

jobs:
  Format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1
  Benchmark-Accuracy:
    name: Benchmark Accuracy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install and benchmark package (using nox group)
        run: |
          uv sync --group nox
          uv run nox -s benchmark_accuracy
        env:
          PYTHONUNBUFFERED: 1
      - name: Commit image
        uses: EndBug/add-and-commit@v9
        with:
          message: "Add accuracy benchmark graph [skip ci]"
          add: "src/benchmark/accuracy_benchmark.png"
  Tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    name: Check Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install and test package (using nox group)
        run: |
          uv sync --group nox
          uv run nox -s tests
