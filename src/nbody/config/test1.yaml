simulation:
  name: "Two-Body Test"
  engine: "euler"
  timestep: 0.01
  t_total: 703   # exactly one period
  output_dir: "results_test"
  G: 1.0

bodies:
  list:
    - id: "BodyA"
      mass: 10.0
      radius: 1.0
      position: [-50.0, 0.0]   # orbiting center of mass at x=-r/2
      velocity: [0.0, -0.4472136]  # perpendicular velocity for circular orbit
    - id: "BodyB"
      mass: 10.0
      radius: 1.0
      position: [50.0, 0.0]    # x=r/2
      velocity: [0.0, 0.4472136]

preprocess:
  normalize_positions: false
  normalize_velocities: false
